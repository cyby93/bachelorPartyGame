<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAID NIGHT — Host</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f1923; color: #fff; font-family: 'Segoe UI', Arial, sans-serif; height: 100vh; display: flex; overflow: hidden; }

    #sidebar {
      width: 260px; min-width: 260px;
      background: #16202a;
      border-right: 2px solid #1e3a4a;
      display: flex; flex-direction: column;
      padding: 20px 16px; gap: 16px;
    }
    #sidebar h1 { font-size: 22px; color: #00d2ff; letter-spacing: 2px; text-align: center; }
    #sidebar h3 { font-size: 13px; color: #7fa8c0; text-transform: uppercase; letter-spacing: 1px; }

    #server-info { background: #0f1923; border-radius: 8px; padding: 10px; text-align: center; }
    #server-ip   { font-size: 13px; color: #aad4e8; margin-top: 4px; word-break: break-all; }

    #qr-wrap     { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    #qr-code     { background: #fff; padding: 6px; border-radius: 6px; }
    #qr-hint     { font-size: 11px; color: #7fa8c0; }

    #player-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
    .player-item {
      background: #0f1923; border-radius: 6px; padding: 8px 10px;
      border-left: 3px solid #00d2ff;
      display: flex; justify-content: space-between; align-items: center;
    }
    .player-item .pname  { font-size: 14px; }
    .player-item .pclass { font-size: 12px; opacity: 0.7; }
    #waiting-msg { color: #7fa8c0; font-size: 13px; text-align: center; margin-top: 8px; }

    #start-btn {
      padding: 12px; border-radius: 8px; border: none; cursor: pointer;
      font-size: 16px; font-weight: bold; letter-spacing: 1px;
      background: linear-gradient(135deg, #00d2ff, #0070a8);
      color: #fff;
      transition: opacity 0.2s;
    }
    #start-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    #level-selector { display: flex; align-items: center; gap: 8px; justify-content: center; }
    #level-selector button {
      padding: 6px 12px; border-radius: 6px; border: 1px solid #1e3a4a;
      background: #0f1923; color: #7fa8c0; cursor: pointer; font-size: 13px; font-weight: bold;
    }
    #level-selector button:hover { background: #1e3a4a; color: #fff; }
    #selected-level-name { color: #00d2ff; font-size: 13px; min-width: 180px; text-align: center; }

    #fullscreen-btn {
      padding: 8px; border-radius: 6px; border: 1px solid #1e3a4a;
      background: #0f1923; color: #7fa8c0; cursor: pointer; font-size: 13px;
    }
    #fullscreen-btn:hover { background: #1e3a4a; color: #fff; }

    #main-layout {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      background: #0a1018;
    }

    #level-panel {
      min-height: 76px;
      padding: 14px 18px;
      border-bottom: 1px solid #1e2d3a;
      background: linear-gradient(180deg, #101a25 0%, #0c141d 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }
    #level-panel[hidden] { display: none; }

    #level-meta {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    #level-index {
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #7fa8c0;
    }
    #current-level-name {
      font-size: 24px;
      font-weight: 700;
      color: #ffffff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #objective-card {
      flex: 0 0 320px;
      max-width: 40%;
      padding: 12px 14px;
      border: 1px solid #1e3a4a;
      border-radius: 10px;
      background: rgba(5, 11, 18, 0.7);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    #objective-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #00d2ff;
    }
    #objective-value {
      font-size: 20px;
      font-weight: 700;
      color: #ffffff;
    }

    #canvas-wrap {
      flex: 1;
      min-width: 0;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 12px;
    }
    canvas {
      display: block;
      max-width: 100% !important;
      max-height: 100% !important;
      width: auto !important;
      height: auto !important;
    }

    @media (max-width: 960px) {
      #level-panel {
        flex-direction: column;
        align-items: stretch;
      }

      #objective-card {
        max-width: none;
        flex-basis: auto;
      }

      #current-level-name {
        white-space: normal;
      }
    }

    /* Connection badge */
    #conn-badge {
      position: absolute; top: 10px; right: 14px;
      font-size: 12px; padding: 4px 10px; border-radius: 20px;
      background: #e74c3c; color: #fff;
    }
    #conn-badge.connected { background: #2ecc71; }
  </style>
</head>
<body>
  <div id="sidebar">
    <h1>RAID NIGHT</h1>

    <div id="server-info">
      <h3>Join at</h3>
      <div id="server-ip">connecting…</div>
    </div>

    <div id="qr-wrap">
      <div id="qr-code"></div>
      <span id="qr-hint" class="qr-hint">Scan to open controller</span>
    </div>

    <div>
      <h3>Players connected</h3>
      <div id="player-list">
        <p id="waiting-msg">Waiting for players…</p>
      </div>
    </div>

    <div id="level-selector" style="display:none">
      <button id="prev-level-btn">&#9664; Prev</button>
      <span id="selected-level-name">Level 1: The Courtyard</span>
      <button id="next-level-btn">Next &#9654;</button>
      <label id="skip-dialog-label" style="font-size:12px;color:#aaa;cursor:pointer;margin-left:8px">
        <input type="checkbox" id="skip-dialog-chk"> Skip dialog
      </label>
    </div>
    <button id="start-btn" disabled>START GAME</button>
    <button id="fullscreen-btn" title="Toggle fullscreen">⛶ Fullscreen</button>
  </div>

  <div id="main-layout">
    <div id="level-panel" hidden>
      <div id="level-meta">
        <div id="level-index"></div>
        <div id="current-level-name"></div>
      </div>

      <div id="objective-card">
        <div id="objective-label"></div>
        <div id="objective-value"></div>
      </div>
    </div>

    <div id="canvas-wrap"></div>
  </div>

  <div id="conn-badge">Connecting…</div>

  <!-- QR code library -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script type="module" src="./client/host/main.js"></script>
</body>
</html>
